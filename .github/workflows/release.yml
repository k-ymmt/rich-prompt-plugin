name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            ext: dylib
          - target: x86_64-apple-darwin
            runner: macos-latest
            ext: dylib
            features: "--features git2/vendored-openssl"
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: so
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}
      - name: Rename artifact
        run: mv target/${{ matrix.target }}/release/librich_prompt_plugin.${{ matrix.ext }} librich_prompt_plugin-${{ matrix.target }}.${{ matrix.ext }}
      - uses: actions/upload-artifact@v4
        with:
          name: librich_prompt_plugin-${{ matrix.target }}
          path: librich_prompt_plugin-${{ matrix.target }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} --generate-notes librich_prompt_plugin-*
